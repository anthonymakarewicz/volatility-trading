# Config-driven skew mispricing workflow with named economic stress scenarios.
logging:
  level: INFO
  color: true

data:
  options:
    ticker: SPY
    provider: orats
    proc_root: data/processed/orats/options_chain
  features:
    ticker: SPY
    provider: orats
    proc_root: data/processed/orats/daily_features
  hedge:
    ticker: SPY
    provider: yfinance
    proc_root: data/processed/yfinance/time_series
    price_column: close
  benchmark:
    ticker: SP500TR
    provider: yfinance
    proc_root: data/processed/yfinance/time_series
    price_column: close
    symbol: SP500TR
  rates:
    provider: fred
    proc_root: data/processed/fred
    series_id: dgs3mo
    column: dgs3mo

strategy:
  name: skew_mispricing
  params:
    target_dte: 30
    delta_target_abs: 0.25
    delta_tolerance: 0.10
    max_holding_period: 30
    risk_budget_pct: 0.03
    margin_budget_pct: 0.40
    entry_risk_basis: entry_hedged
    delta_hedge:
      enabled: true
      target_net_delta: 0.0
      trigger:
        band_model:
          model: fixed
          half_width_abs: 25.0
        rebalance_every_n_days: 5
        combine_mode: or
      rebalance_to: center
      allow_missing_hedge_price: false
      min_rebalance_qty: 1.0

account:
  initial_capital: 100000.0

execution:
  option:
    model: bid_ask_fee
    params:
      commission_per_leg: 1.0
  hedge:
    model: fixed_bps
    params:
      fee_bps: 1.0

broker:
  margin:
    model:
      name: regt
      params:
        broad_index: false
    policy:
      maintenance_margin_ratio: 0.80
      margin_call_grace_days: 2
      liquidation_mode: target
      liquidation_buffer_ratio: 0.10
      apply_financing: true
      cash_rate_source: data_rates
      borrow_rate_spread: 0.02

modeling:
  scenario_generator:
    name: named_scenarios
    params:
      # Recommended default for skew: generic core scenarios plus default RR
      # scenarios. Add `tail` and/or `rr_tail` explicitly only when you want
      # extreme generic or skew-specific tail stress.
      scenario_families: [core, rr]

run:
  start_date: "2021-01-01"
  end_date: "2023-12-31"

reporting:
  output_root: reports/backtests
  run_id: spy_2021_2023_named_stress_2
  benchmark_name: SP500TR
  save_report_bundle: true
  include_dashboard_plot: true
  include_component_plots: true
