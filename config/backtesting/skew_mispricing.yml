# Config-driven skew mispricing workflow for `backtest-run`.
logging:
  level: INFO
  color: true

data:
  options:
    ticker: SPY
    provider: orats
    proc_root: data/processed/orats/options_chain
  features:
    ticker: SPY
    provider: orats
    proc_root: data/processed/orats/daily_features
  hedge:
    ticker: SPY
    provider: yfinance
    proc_root: data/processed/yfinance/time_series
    price_column: close
  benchmark:
    ticker: SP500TR
    provider: yfinance
    proc_root: data/processed/yfinance/time_series
    price_column: close
    symbol: SP500TR
  rates:
    provider: fred
    proc_root: data/processed/fred
    series_id: dgs3mo
    column: dgs3mo

strategy:
  name: skew_mispricing
  params:
    target_dte: 30
    delta_target_abs: 0.25
    delta_tolerance: 0.10
    max_holding_period: 30
    risk_budget_pct: 0.03
    margin_budget_pct: 0.40

account:
  initial_capital: 100000.0

execution:
  option:
    model: bid_ask_fee
    params:
      commission_per_leg: 1.0
  hedge:
    model: fixed_bps
    params:
      fee_bps: 1.0

broker:
  margin:
    model:
      name: regt
      params:
        broad_index: false

modeling: {}

run:
  start_date: "2018-01-01"
  end_date: "2020-12-31"

reporting:
  output_root: reports/backtests
  run_id: spy_2018_2020
  benchmark_name: SP500TR
  save_report_bundle: true
  include_dashboard_plot: true
  include_component_plots: true
